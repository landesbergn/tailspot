name: tests

on:
  pull_request:
    branches: [main]

# Newer pushes to the same PR cancel in-flight runs.
concurrency:
  group: tests-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # PINNED, not latest-stable: 'macos-latest' images roll out gradually,
      # so 'latest-stable' resolved to different Xcodes on different runs
      # (26.6 vs 26.3 within one day, 2026-07-11) — and the older compiler
      # type-checked differently than local dev. Pin to the version Noah
      # builds with locally; bump this deliberately alongside local Xcode
      # upgrades. If the runner image lacks this version the job fails
      # loudly here (better than silent drift) — bump or wait for the image.
      - name: Select Xcode (pinned to local dev version)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.6'

      # Prints the toolchain + the simulators this runner image actually
      # has, so if 'iPhone 17' is absent the log tells us what to switch to.
      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep -i iphone || true

      - name: Run TailspotTests
        run: |
          set -o pipefail
          xcodebuild test \
            -project ios/Tailspot/Tailspot.xcodeproj \
            -scheme Tailspot \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -only-testing:TailspotTests \
            CODE_SIGNING_ALLOWED=NO
