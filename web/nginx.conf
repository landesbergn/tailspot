server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript text/plain;
    gzip_min_length 256;

    # CSS/JS have stable filenames and change on deploy — revalidate every time
    # (ETag → 304 when unchanged) so updates land immediately, never stale.
    # ("immutable" is only safe for content-hashed names, which we don't use.)
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache";
    }

    # Images & fonts — short cache, not "immutable" (filenames are stable too).
    location ~* \.(ico|png|jpg|jpeg|svg|woff2?)$ {
        expires 1d;
    }

    # HTML pages — revalidate each time
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Root
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404 — squawk 7600 (lost comms)
    error_page 404 /404.html;
    location = /404.html { internal; }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
