# fly.toml — Tailspot API on Fly.io
# Primary region: sjc (San Jose, CA) — close to SFO/OAK field-test area.
# Deploy with: fly deploy (from this directory)
# Manage with: fly dashboard  https://fly.io/apps/tailspot-api

app = "tailspot-api"
primary_region = "sjc"

[build]
  # Uses the multi-stage Dockerfile in this directory.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    path = "/healthz"
    timeout = "2s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
